<div class="min-h-screen bg-slate-50 flex items-center justify-center px-6 antialiased">
  <div class="max-w-md w-full text-center">
    <div class="relative mb-8">
      <h1 class="text-[12rem] font-black text-slate-200 leading-none select-none">404</h1>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="bg-white p-6 rounded-3xl shadow-[0_10px_25px_rgba(0,0,0,0.1)] rotate-3">
          <span class="text-6xl">📦</span>
        </div>
      </div>
    </div>

    <h2 class="text-3xl font-bold text-slate-900 mb-4">糟糕！搜尋不到該結果</h2>
    <p class="text-slate-500 mb-10 leading-relaxed text-base font-bold">
      您找尋的頁面可能已經過期、被移動，或者這個團購活動已經圓滿結束囉。
    </p>

    <div class="flex flex-col gap-4">
      <button (click)="goHome()" class="cursor-pointer w-full bg-red-900 text-white font-bold py-4 rounded-2xl
                       hover:bg-red-950 transition-all active:scale-95
                       shadow-[0_4px_6px_rgba(0,0,0,0.2)]">
        回到 GogoBuy 首頁
      </button>

      <button (click)="goSupport()" class="cursor-pointer w-full bg-white text-slate-600 font-bold py-4 rounded-2xl
                       border border-slate-200 hover:bg-slate-50 transition-all active:scale-95">
        查看常見問題 FAQ
      </button>
    </div>

    <button onclick="history.back()"
      class="mt-8 cursor-pointer text-base font-bold text-slate-700 hover:text-blue-600 underline underline-offset-4">
      返回上一頁
    </button>
  </div>
</div>
