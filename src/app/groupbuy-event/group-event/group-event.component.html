@if(!storeList){
  <div class="min-h-screen flex flex-col bg-gray-50">
    <div class="flex-1 flex flex-col justify-center items-center bg-[#F4E7E1] px-4 text-center">
      <div class="text-6xl mb-4"><i class="pi pi-search !text-6xl text-[#662222]"></i></div>
      <h2 class="text-2xl md:text-4xl font-bold text-[#662222]">無店家資料</h2>
      <p class="text-gray-500 mt-2 text-sm md:text-base">很抱歉，找不到您指定的店家資訊。</p>
      <button class="mt-6 px-8 py-2 bg-[#662222] border-1 text-white rounded-full
                      hover:bg-white hover:border-[#662222] hover:!text-[#662222]
                      transition-all w-full md:w-auto"
              (click)="goTo()">
        返回首頁
      </button>
    </div>
  </div>
}@else {
  <div class="flex justify-center align-center">
    <div class="flex flex-col w-[90vw] rounded-lg
                h-fit mt-[20px] bg-[#F4E7E1]/50
                md:flex-row md:h-fit md:mt-[30px]">
      <img src={{storeList?.image}} crossorigin="anonymous"
          class="rounded-t-lg aspect-[3/2] object-cover
              md:rounded-l-lg md:rounded-tr-none md:mr-[20px]">
      <div class="py-[20px] ml-[10px] w-[290px] h-full
                  md:my-[0px] md:w-[600px] md:flex md:flex-col md:justify-center md:align-center">
        <p class="storeName">{{storeList?.name}}</p>
        <table class="store-table">
          <tr>
            <td><i class="pi pi-phone td-icon"></i></td><td>{{storeList?.phone}}</td>
          </tr>
          <tr>
            <td><i class="pi pi-address-book td-icon"></i></td><td>{{storeList?.address}}</td>
          </tr>
        </table>
        <label class="ml-[10px] mt-[20px]">
          <span class="px-2 py-0.5 rounded text-base font-medium"
                [ngClass]="isOpen ? 'bg-emerald-400/20 text-green-800' : 'bg-red-100 text-red-800'">
            {{ isOpen ? '● 營業中' : '○ 休息中' }}
          </span>
          <span class="ml-[20px]">{{operateString}}</span>
        </label>
        <div class="ml-[10px] mt-[5px] text-small text-gray-500">{{nextOperating}}</div>
      </div>
    </div>
  </div>
}
