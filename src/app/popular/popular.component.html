<section class="max-w-[1440px] mx-auto p-4 md:p-4">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div class="flex flex-wrap items-center gap-4">
      <h2 class="text-3xl font-black text-slate-900 flex items-center gap-3">
        <span class="w-2 h-8 bg-red-600 rounded-full"></span>
        TOP 10 熱門
      </h2>

      <!-- 排名 -->
      <div class="w-[160px]">
        <p-select [options]="statusOptions" [ngModel]="statusFilter()" (ngModelChange)="onStatusChange($event)"
          optionLabel="label" optionValue="value" styleClass="w-full h-[40px] rounded-xl text-sm">
        </p-select>
      </div>

    </div>
  </div>
</section>


<section class="max-w-[1440px] mx-auto p-4">
  @for (item of salesDetailList(); track item.menuId; let idx = $index) {
  <div class="flex items-center justify-between p-4 rounded-xl bg-white shadow mb-3">
    <div class="flex items-center gap-4">
      <!-- 排名 -->
      <div class="text-xl font-black text-red-600">#{{ idx + 1 }}</div>
      <div>
        <!-- 商家名稱 -->
        <div class="font-bold text-slate-900">{{ item.storeName }}</div>
        <!-- 產品名稱 -->
        <div class="text-sm text-gray-500">{{ item.productName }}</div>
      </div>
    </div>
    <!-- 銷售份額 -->
    <div class="text-lg font-bold text-slate-800">{{ item.salesVolume }} 份</div>
  </div>
  }
</section>
