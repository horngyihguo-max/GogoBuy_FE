<section class="max-w-[1440px] mx-auto px-4 mt-10">
  <h2 class="text-3xl font-black text-slate-900 flex items-center gap-3 mb-6">
    <span class="w-2 h-8 bg-red-600 rounded-full"></span>
    熱門商品
  </h2>

  <!-- 時間篩選按鈕 -->
  <div class="flex gap-2 mb-6 flex-wrap">
    @for (opt of statusOptions; track opt.value) {
    <button (click)="onStatusChange(opt.value)" class="px-4 py-1 rounded-full text-sm font-semibold transition"
      [ngClass]="statusFilter() == opt.value ? 'bg-red-600 text-white' : 'bg-slate-200 text-slate-700'">
      {{ opt.label }}
    </button>
    }
  </div>

  <!-- Bento / Masonry Grid -->
  <!-- Bento 主容器 -->
  <div class="hidden lg:grid gap-4" style="
       height: 75vh;
       grid-template-columns: repeat(3, 1fr);
       grid-template-rows: 2fr 1.5fr 1fr;
     ">

    @for(item of salesDetailList().slice(0,9); track item.menuId; let i=$index){

    <div
      class="relative rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 group cursor-pointer"
      [style.grid-column]="
        i < 3 ? 'span 1' :
        i < 6 ? 'span 1' :
        'span 1'
      " [style.grid-row]="
        i < 3 ? '1' :
        i < 6 ? '2' :
        '3'
      " (click)="goStore(item.storeId)">

      <!-- 圖片 -->
      <img [src]="item.productImage || 'Default Product Image.webp'"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />

      <!-- 排名標籤 -->
      <div class="absolute top-2 left-2 px-2 py-1 rounded-full font-bold text-sm"
        [ngClass]="i < 3 ? 'bg-yellow-400 text-black' : 'bg-red-600 text-white'">
        #{{ i + 1 }}
      </div>

      <!-- 底部漸層 -->
      <div class="absolute bottom-0 w-full p-3 text-white
                  bg-gradient-to-t from-black/70 to-transparent">

        <div [ngClass]="
              i < 3 ? 'text-lg font-bold' :
              i < 6 ? 'text-base font-semibold' :
              'text-sm font-medium'
            " class="truncate">
          {{ item.productName }}
        </div>

        <div class="text-xs opacity-80 truncate">
          {{ item.storeName }}
        </div>

        <div class="text-sm font-semibold">
          {{ item.salesVolume }} 份
        </div>

      </div>

    </div>

    }

  </div>

</section>
