<section class="w-full max-w-[1440px] mx-auto p-4">
  <!--
    這一段是「篩選列」：
    使用者在這裡選品牌 / 餐點種類（評價為佔位格，不一定要做，可刪除或更改）
    選完後會改變 signal（selectedStoreNames、selectedFoodTypes）
    卡片區用 filteredStores() 讀取結果，所以會即時更新
  -->
  <div class="bg-gray-200 min-h-[89px] flex flex-wrap items-center gap-4 p-4">

    <!-- ========= 品牌（店名）篩選 ========= -->
    <div class="flex items-center gap-2 shrink-0">
      <span class="font-bold whitespace-nowrap">品牌</span>
      <!--
          p-multiselect是多選下拉選單(PRIMENG套件)
          options 來源：storeOptions()（由所有 stores() 產生）
          使用者勾選後，會把「選到的品牌名稱陣列」放進 selectedStoreNames
          filter=true：下拉面板裡會有搜尋框（可搜尋選項）
          display="chip"：選到的項目會顯示成標籤
      -->
      <p-multiselect class="w-64" [options]="storeOptions()" optionLabel="label" optionValue="value"
        [ngModel]="selectedStoreNames()" (ngModelChange)="selectedStoreNames.set($event ?? [])" [filter]="true"
        display="chip">
      </p-multiselect>
    </div>

    <!-- ========= 餐點種類（type）篩選 ========= -->
    <div class="flex items-center gap-2 shrink-0">
      <span class="font-bold whitespace-nowrap">餐點種類</span>
      <p-multiselect [options]="foodTypeOptions()" optionLabel="label" optionValue="value"
        [ngModel]="selectedFoodTypes()" (ngModelChange)="selectedFoodTypes.set($event ?? [])" [filter]="true"
        display="chip" class="w-64">
      </p-multiselect>
    </div>

    <!-- ========= 評價(佔位格) ========= -->
    <div class="flex items-center gap-2 shrink-0">
      <span class="font-bold whitespace-nowrap">評價</span>
      <input pInputText #searchInput type="text" class="bg-white border rounded px-2 h-10 w-64" />
    </div>

  </div>
</section>

<!-- 這一段是「卡片列表」：用 filteredStores() 當資料來源（已套用品牌 + 餐點種類的篩選）在上面改選項，畫面就會自動更新 -->
<section class="max-w-[1440px] mx-auto p-4 md:p-4 mb-16">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">

    @for (item of filteredStores(); track item.id) {
    <div class="group relative overflow-hidden rounded-3xl bg-slate-200 min-h-[200px] w-full shadow-md
      hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 cursor-pointer" (click)="goStoreInfo(item.id)">

      <!-- 顯示店家圖片，如果圖片載入失敗，就換成隨機圖片（picsum） -->
      <img [src]="item.image" (error)="item.image = 'https://picsum.photos/800/600?random=' + item.id"
        class="absolute inset-0 w-full h-full object-cover transition-transform group-hover:scale-105" />
      <!-- 黑色漸層遮罩 + 文字 -->
      <div
        class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent p-6 flex flex-col justify-end ">
        <!-- 店名 -->
        <h3
          class="text-xl font-bold text-white mb-2 translate-y-4 group-hover:translate-y-0 transition-transform duration-300 ">
          {{ item.name }}
        </h3>
        <!-- type（餐點種類） -->
        <div class="flex items-center justify-between opacity-0 group-hover:opacity-100
             translate-y-4 group-hover:translate-y-0 transition-all duration-300 delay-75">
          <span class="text-white/80 text-xs">{{ item.type }}</span>
          <i class="pi pi-arrow-right text-white text-xs"></i>
        </div>
      </div>
    </div>
    }
  </div>
</section>
