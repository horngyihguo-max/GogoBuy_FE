<body class="bg-slate-50 min-h-svh">

  <!--輪播欄-->
  <section class="max-w-[1440px] mx-auto mt-6 px-4 md:px-8">
    <!--[numVisible]一次可顯示X個圖片，[numScroll]有幾個滾輪，[circular]圖片是否可重複，[autoplayInterval]自動撥放秒數，
    [showIndicators]是否顯示滾輪，[showNavigators]是否顯示左右翻閱鍵-->
    <p-carousel [value]="banners" [numVisible]="3" [numScroll]="1" [circular]="true" [autoplayInterval]="4000"
      (onPage)="onCarouselPage($event)">
      <ng-template pTemplate="item" let-banner let-i="index">
        <div class="carousel-item-wrapper px-1">
          <div class="banner relative overflow-hidden rounded-2xl" [class.is-center]="i === centerIndex">

            <img [src]="banner.image" [alt]="banner.title" class="w-full h-full object-cover" />

            <div class="banner-mask absolute inset-0 bg-black/40 backdrop-blur-sm pointer-events-none"></div>

            <div class="banner-title absolute bottom-4 left-4 z-10 text-white font-bold text-lg drop-shadow-md">
              {{ banner.title }}
            </div>

          </div>
        </div>
      </ng-template>
    </p-carousel>

  </section>

  <!--開團中店家-->
  <section class="max-w-[1440px] mx-auto p-4 md:p-8">
    <h2 class="text-3xl font-black text-slate-900 mb-8 flex items-center gap-3">
      <span class="w-2 h-8 bg-red-600 rounded-full"></span>
      正在開團中
    </h2>

    <!-- 卡片RWD grid-cols-1(手機板一次顯示1個卡片) md:grid-cols-2(平板一次顯示2個卡片) lg:grid-cols-5(電腦版一次顯示5個卡片)
     gap-6(卡片之間相隔距離) -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">

      @for (store of stores; track store.id;) {
      <!-- rounded-3xl  -->
      <div class="group relative overflow-hidden rounded-3xl transition-all duration-300 ' +
        'col-span-1 min-h-[200px]">
        <img [src]="store.image"
          class="absolute inset-0 w-full h-full object-cover transition-transform group-hover:scale-105" />

        <div
          class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent p-6 flex flex-col justify-end">
          <h3 class="text-lg font-bold text-white">
            {{ store.name }}
          </h3>

          <div class="flex items-center justify-between mt-4 opacity-0 group-hover:opacity-100 transition-opacity">
            <span class="text-white/80 text-xs">查看詳情</span>
            <i class="pi pi-arrow-right text-white text-xs"></i>
          </div>
        </div>
      </div>
      }
    </div>
  </section>
</body>
