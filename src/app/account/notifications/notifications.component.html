<div class="min-h-screen bg-slate-100 px-6 py-10">
  <div class="max-w-4xl mx-auto">
    <!-- 標題區 -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-[35px] font-black text-red-900 tracking-tight">通知</h1>
        <p class="text-[20px] text-slate-600 mt-1 font-bold">
          查看你的最新系統通知與提醒
        </p>
      </div>

      <button
        type="button"
        class="text-[15px] font-bold text-red-900 hover:underline"
        (click)="markAllRead()"
      >
        全部標示為已讀
      </button>
    </div>

    <!-- 通知列表 -->
    @if (notifications$ | async; as notifications) { @if (notifications.length
    === 0) {
    <!-- 空狀態 -->
    <div class="bg-white rounded-2xl p-10 text-center shadow">
      <p class="text-[16px] text-slate-500">目前沒有任何通知</p>
    </div>
    } @else {

    <div class="space-y-4">
      @for (n of notifications; track n.id) {
      <div
        class="relative bg-white rounded-2xl p-6 shadow transition hover:shadow-md cursor-pointer hover:bg-slate-50"
        [class.border-l-4]="!n.isRead"
        [class.border-red-900]="!n.isRead"
        (click)="markAsRead(n)"
      >
        <!-- 未讀紅點 -->
        @if (!n.isRead) {
        <span
          class="absolute top-6 right-6 w-3 h-3 rounded-full bg-red-900"
        ></span>
        }

        <div class="flex flex-col gap-2">
          <div class="flex items-center gap-3">
            <h2 class="text-[18px] font-extrabold text-slate-900">
              {{ n.title }}
            </h2>

            @if (!n.isRead) {
            <span
              class="text-[13px] font-bold text-red-900 bg-red-100 px-2 py-0.5 rounded-full"
            >
              未讀
            </span>
            }
          </div>

          <p class="text-[15px] text-slate-700 leading-relaxed">
            {{ n.message }}
          </p>

          <p class="text-[14px] text-slate-500">
            {{ n.createdAt }}
          </p>
        </div>
      </div>
      }
    </div>

    } }
  </div>
</div>
