<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl border border-gray-100 sm:rounded-2xl sm:px-10">

      <div class="text-center">

        @if (status === 'loading') {
          <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mb-4"></div>
            <h2 class="text-2xl font-bold text-gray-900">帳號驗證中</h2>
            <p class="mt-2 text-base font-bold text-gray-500">請稍候，我們正在確認您的身份...</p>
          </div>
        }

        @if (status === 'success') {
          <div class="flex flex-col items-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
              <svg class="h-10 w-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">開通成功！</h2>
            <p class="mt-2 text-xl font-bold text-gray-600">您的帳號已準備就緒。</p>
            <div class="mt-6 w-full">
              <p class="text-base font-semibold text-blue-500 animate-pulse">系統將在幾秒後自動跳轉至登入頁面...</p>
              <button (click)="toLogin()" class="mt-4 w-full cursor-pointer flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                立即前往登入
              </button>
            </div>
          </div>
        }

        @if (status === 'error') {
          <div class="flex flex-col items-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-4">
              <svg class="h-10 w-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">驗證失敗</h2>
            <p class="mt-2 text-xl text-red-500 font-bold">{{ errorMessage }}</p>
            <p class="mt-1 text-base font-semibold text-gray-400">這可能是因為連結已過期或已被使用。</p>

            <div class="mt-6 flex flex-col gap-3 w-full">
              <button (click)="resendEmail()" class="w-full py-2 px-4 border border-gray-300 rounded-md shadow-sm cursor-pointer text-base font-bold text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                重新發送驗證信
              </button>
              <button routerLink="/registration" class="w-full text-base font-bold text-blue-600 cursor-pointer hover:text-blue-500">
                返回註冊頁面
              </button>
            </div>
          </div>
        }

      </div>
    </div>
  </div>
</div>
