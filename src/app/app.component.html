<div class="topbar-wrapper">
  <header>
    <!-- LOGO -->
    <img routerLink="gogobuy" src="ggb3.png" class="logo cursor-pointer h-13">

    <!-- 搜尋欄，@if (showSearch)讓搜尋欄只在route:gogobuy出現 -->
    @if (showSearch) {
    <div class="max-w-4xl me-90 disappear">
      <div class="ml-10 relative w-full max-w-md disappear">
        <i
          class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-lg pointer-events-none disappear"></i>
        <input type="search" placeholder="搜尋店家、地址" class="w-3xl pl-10 pr-4 py-3 rounded-lg border border-gray-300
              focus:outline-none focus:ring-2 focus:ring-red-300
              focus:border-red-400 bg-white disappear" />
      </div>
    </div>
    }

    <nav>
      <!-- 右側功能列表 -->
      <ul class="items-center justify-center disappear">
        <li><i class="pi pi-bell cursor-pointer" style="color: rgb(255, 255, 255); font-size: 1.5rem"></i>
        </li>
        <li><i class="pi pi-cart-plus cursor-pointer" style="color: rgb(255, 255, 255); font-size: 1.5rem"></i></li>
        <li>
          @if (userAvatar) {
          <img [src]="userAvatar" (error)="userAvatar = 'assets/default-avatar.png'"
            class="w-9 h-9 rounded-full cursor-pointer" (click)="menu.toggle($event)" alt="avatar">
          } @else {
          <i class="pi pi-user cursor-pointer" style=" color: rgb(255, 255, 255); font-size: 1.5rem"
            (click)="menu.toggle($event)"></i>
          }
          <p-menu #menu [popup]="true" [model]="items" [model]="filteredItems" appendTo="body"></p-menu>
        </li>
      </ul>
    </nav>
  </header>

  <!-- 跑馬燈 -->
  <div class="marquee">
    <div class="marquee__track">
      <div class="marquee__group"> <span class="marquee__item">Your scrolling text goes here.</span> <span
          class="marquee__item">GogoBuy 熱門團購</span> </div>
    </div>
  </div>

  <!-- 手機板搜尋欄，class="search-mobile"讓搜尋欄只在手機板出現 -->
  @if (showSearch) {
  <div class="search-mobile">
    <div class="relative w-full max-w-md">
      <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-lg pointer-events-none"></i>
      <input type="search" placeholder="搜尋店家、地址" class="pl-10 pr-4 py-3 rounded-lg border border-gray-300
                  focus:outline-none focus:ring-2 focus:ring-red-300
                  focus:border-red-400 bg-white" />
    </div>
  </div>
  }

</div>


<!-- main(顯示頁面，其他網頁主要修改) -->
<main [class.main--with-mobile-search]="showSearch">
  <router-outlet></router-outlet>
</main>

<!-- footer -->
<footer>
  <div class="footer-container">
    <div class="footer-info">
      <h4 class="font-bold">聯繫我們</h4>
      <p class="font-bold">地址：台南市歸仁區歸仁十三路一段6號</p>
      <p class="font-bold">電話：(06) 303 2550</p>
    </div>
    <div class="footer-links">
      <a class="font-bold" href="privacyPolicy">隱私政策</a>
      <a class="font-bold"> | </a>
      <a class="font-bold" href="conditions">服務條款</a>
      <a class="font-bold"> | </a>
      <a class="font-bold" href="problems">常見問題</a>
    </div>
  </div>
  <div class="footer-bottom">
    <a class="font-bold">&copy; 2026 GogoBuy</a>
  </div>
</footer>


<!-- 常見問題+氣泡 -->
<button class="question" type="button" balloon-data="有甚麼疑問嗎?點擊這裡" aria-label="常見問題"
  (click)="problemMenu.toggle($event)">
  ?
</button>
<p-menu #problemMenu [popup]="true" [model]="problems"></p-menu>

<!-- 手機板footer -->
<div class="footer-mobile">
  <!-- 首頁 -->
  <a routerLink="gogobuy">
    <div>
      <i class="pi pi-home cursor-pointer" style="font-size: 1.5rem"
        [ngStyle]="{ 'color': (router.url == '/gogobuy') ? 'rgba(0, 0, 0)' : '' }"></i>
    </div>
    <div [ngStyle]="{ 'color': (router.url == '/gogobuy') ? 'rgba(0, 0, 0)' : '' }">
      訂購
    </div>
  </a>
  <!-- 購物車 -->
  <a>
    <div>
      <i class="pi pi-cart-plus cursor-pointer" style="font-size: 1.5rem"></i>
    </div>
    <div>
      購物車
    </div>
  </a>
  <!-- 訂單 -->
  <a routerLink="orders">
    <div>
      <i class="pi pi-receipt cursor-pointer" style="font-size: 1.5rem"
        [ngStyle]="{ 'color': (router.url == '/orders') ? 'rgba(0, 0, 0)' : '' }"></i>
    </div>
    <div [ngStyle]="{ 'color': (router.url == '/orders') ? 'rgba(0, 0, 0)' : '' }">
      訂單
    </div>
  </a>
  <!-- 通知訊息 -->
  <a routerLink="404">
    <div>
      <i class="pi pi-bell cursor-pointer" style="font-size: 1.5rem"></i>
    </div>
    <div>
      訊息
    </div>
  </a>
  <!-- 我的 -->
  <a routerLink="personInfo">
    <div>
      @if (userAvatar) {
      <img [src]="userAvatar" (error)="userAvatar = 'assets/default-avatar.png'"
        class="w-9 h-9 rounded-full cursor-pointer" (click)="menu.toggle($event)" alt="avatar"
        [ngStyle]="{ 'color': (router.url == '/personInfo') ? 'rgba(0, 0, 0)' : '' }">
      } @else {
      <i class="pi pi-user cursor-pointer" style=" color: rgb(255, 255, 255); font-size: 1.5rem"
        (click)="menu.toggle($event)" [ngStyle]="{ 'color': (router.url == '/personInfo') ? 'rgba(0, 0, 0)' : '' }"></i>
      }
    </div>
    <div [ngStyle]="{ 'color': (router.url == '/personInfo') ? 'rgba(0, 0, 0)' : '' }">
      我的
    </div>
  </a>
</div>
