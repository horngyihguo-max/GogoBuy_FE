<div class="topbar-wrapper">
  <header class="flex items-center justify-between px-4">
    <!-- LOGO -->
    <div class="flex-none">
      <img routerLink="gogobuy" src="ggb3.png" class="logo cursor-pointer h-13">
    </div>

    <!-- 搜尋欄，@if (showSearch)讓搜尋欄只在 /gogobuy/home 出現 -->
    @if (showSearch) {

    <!-- disappear桌機顯示/手機隱藏 -->
    <div class="flex-1 flex justify-center disappear px-4">
      <div class="relative flex items-center w-full md:w-[560px] group">

        <!-- 搜尋類型選單 -->
        <!-- select 絕對定位在 input 上方，所以 input 需要 pl-[95px] 預留左側空間 -->
        <select class="absolute left-3 h-10 px-3 pr-8 bg-white text-slate-700 text-sm rounded-xl shadow-sm
        border border-slate-200 outline-none focus:ring-2 focus:ring-red-600/20 appearance-none cursor-pointer"
          [value]="searchMode()" (change)="onSearchModeChange($event)">

          <!-- 切換搜尋類型時會清空輸入並重置列表（onSearchModeChange 內處理） -->
          <option value="store">店家</option>
          <option value="host">團長</option>
          <option value="event">團名</option>
        </select>
        <i class="pi pi-angle-down absolute left-[60px] text-slate-400 pointer-events-none text-sm"></i>

        <!-- 輸入框-->
        <input #searchInput type="text" [placeholder]="searchPlaceholder()" (keyup.enter)="onSearch(searchInput.value)"
          class="w-full pl-[95px] pr-24 py-3 bg-white border-none rounded-2xl shadow-sm
               focus:ring-2 focus:ring-red-600/20 outline-none transition-all placeholder:text-slate-400" />
        <button (click)="onSearch(searchInput.value)" class="absolute right-2 bg-red-600 text-white px-5 py-1.5 rounded-xl text-sm font-bold
               hover:bg-red-700 transition-colors shadow-lg shadow-red-600/20">
          搜尋
        </button>
      </div>
    </div>
    }


    <nav>
      <!-- 右側功能列表 -->
      <ul class="items-center justify-center disappear">
        <!-- 通知鈴鐺 -->
        <li>
          <app-notification-bell></app-notification-bell>
        </li>
        <li><i class="pi pi-cart-plus cursor-pointer" style="color: rgb(255, 255, 255); font-size: 1.5rem"></i></li>
        <li>
          <i class="pi pi-user cursor-pointer" style=" color: rgb(255, 255, 255); font-size: 1.5rem"
            (click)="menu.toggle($event)"></i>

          <!-- appendTo="body" 避免 menu 被 header/overflow 裁切 -->
          <p-menu #menu [popup]="true" [model]="filteredItems" appendTo="body"></p-menu>
        </li>
      </ul>
    </nav>
  </header>

  <!-- 跑馬燈 -->
  <div class="marquee">
    <div class="marquee__track">
      <div class="marquee__group">
        <span class="marquee__item font-bold text-lg">GogoBuy 熱門團購</span>
      </div>
    </div>
  </div>
</div>

<!-- 手機板搜尋欄，class="search-mobile"讓搜尋欄只在手機板出現 -->
@if (showSearch) {
<div class="search-mobile">
  <div class="relative flex items-center w-full md:w-[560px] group">

    <!-- 搜尋類型選單 -->
    <!-- select 絕對定位在 input 上方，所以 input 需要 pl-[95px] 預留左側空間 -->
    <select class="absolute left-3 h-10 px-3 pr-8 bg-white text-slate-700 text-sm rounded-xl shadow-sm
      border border-slate-200 outline-none focus:ring-2 focus:ring-red-600/20 appearance-none cursor-pointer"
      [value]="searchMode()" (change)="onSearchModeChange($event)">

      <!-- 切換搜尋類型時會清空輸入並重置列表（onSearchModeChange 內處理） -->
      <option value="store">店家</option>
      <option value="host">團長</option>
      <option value="event">團名</option>
    </select>
    <i class="pi pi-angle-down absolute left-[60px] text-slate-400 pointer-events-none text-sm"></i>

    <!-- 輸入框-->
    <input #searchInput type="text" [placeholder]="searchPlaceholder()" (keyup.enter)="onSearch(searchInput.value)"
      class="w-full pl-[95px] pr-24 py-3 bg-white border-none rounded-2xl shadow-sm
             focus:ring-2 focus:ring-red-600/20 outline-none transition-all placeholder:text-slate-400" />
    <button (click)="onSearch(searchInput.value)" class="absolute right-2 bg-red-600 text-white px-5 py-1.5 rounded-xl text-sm font-bold
             hover:bg-red-700 transition-colors shadow-lg shadow-red-600/20">
      搜尋
    </button>
  </div>
</div>
}


<!-- main(顯示頁面，其他網頁主要修改) -->
<main>
  <router-outlet></router-outlet>
</main>

<!-- footer -->
<footer>
  <div class="footer-container footer-info">
    <h4 class="font-bold">聯繫我們</h4>
    <p class="font-bold">地址：台南市歸仁區歸仁十三路一段6號</p>
    <p class="font-bold">電話：(06) 303 2550</p>
  </div>
  <div class="footer-bottom">
    <a class="font-bold text-base">&copy; 2026 GogoBuy</a>
  </div>
</footer>


<!-- 常見問題+氣泡 -->
<button class="question" type="button" balloon-data="有甚麼疑問嗎?點擊這裡" aria-label="常見問題"
  (click)="problemMenu.toggle($event)">
  ?
</button>
<p-menu #problemMenu [popup]="true" [model]="problems"></p-menu>

<!-- 手機 footer 依 router.url 判斷目前頁籤並高亮 -->
<div class="footer-mobile">
  <!-- 首頁 -->
  <a routerLink="gogobuy/home">
    <div>
      <i class="pi pi-home cursor-pointer" style="font-size: 1.5rem"
        [ngStyle]="{ 'color': (router.url == '/gogobuy/home') ? 'rgb(252, 165, 165)' : '' }"></i>
    </div>
    <div [ngStyle]="{ 'color': (router.url == '/gogobuy/home') ? 'rgb(252, 165, 165)' : '' }">
      訂購
    </div>
  </a>
  <!-- 購物車 -->
  <a>
    <div>
      <i class="pi pi-cart-plus cursor-pointer" style="font-size: 1.5rem"></i>
    </div>
    <div>
      購物車
    </div>
  </a>
  <!-- 訂單 -->
  <a routerLink="/user/orders">
    <div>
      <i class="pi pi-receipt cursor-pointer" style="font-size: 1.5rem"
        [ngStyle]="{ 'color': (router.url == '/user/orders') ? 'rgb(252, 165, 165)' : '' }"></i>
    </div>
    <div [ngStyle]="{ 'color': (router.url == '/user/orders') ? 'rgb(252, 165, 165)' : '' }">
      訂單
    </div>
  </a>
  <!-- 通知訊息 -->
  <a routerLink="/user/notifications" class="flex flex-col items-center">
    <div>
      <i class="pi pi-bell cursor-pointer" style="font-size: 1.5rem"
        [ngStyle]="{ 'color': (router.url == '/user/notifications') ? 'rgb(252, 165, 165)' : '' }"></i>
    </div>
    <div [ngStyle]="{ 'color': (router.url == '/user/notifications') ? 'rgb(252, 165, 165)' : '' }">
      通知
    </div>
  </a>
  <!-- 我的 -->
  <a routerLink="/user/profile">
    <div>
      <i class="pi pi-user cursor-pointer" style=" color: rgb(255, 255, 255); font-size: 1.5rem"
        (click)="onUserClick($event, menu)"
        [ngStyle]="{ 'color': (router.url == '/user/profile'||router.url =='/user/profile/edit') ? 'rgb(252, 165, 165)' : '' }"></i>
    </div>
    <div
      [ngStyle]="{ 'color': (router.url == '/user/profile'||router.url =='/user/profile/edit') ? 'rgb(252, 165, 165)' : '' }">
      我的
    </div>
  </a>
</div>
